<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CycleWhere Not Found</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f4ee;
        --surface: #fffdf8;
        --line: #ded7cc;
        --text: #102024;
        --muted: #66747a;
        --brand: #2d6d57;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, "Avenir Next", "Segoe UI", sans-serif;
      }

      main {
        width: min(640px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.3rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        margin-top: 20px;
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--brand);
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found.</h1>
      <p>CycleWhere only exposes the route planner. Head back to the homepage to plan a fair cycling route.</p>
      <a href="/">Open the planner</a>
    </main>
  </body>
  </html>
