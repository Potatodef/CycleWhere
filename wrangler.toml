name = "cyclewhere-api"
main = "worker/index.ts"
compatibility_date = "2026-05-03"

[[d1_databases]]
binding = "TRANSIT_CACHE"
database_name = "cyclewhere-transit-cache"
database_id = "40d3dd74-5c27-4839-8e21-c7f597946098"

[vars]
CORS_ORIGIN = "http://127.0.0.1:5173,http://127.0.0.1:5174,http://localhost:5173,http://localhost:5174"
GRAPHHOPPER_PROFILE_OFFICIAL = "cyclewhere_official"
GRAPHHOPPER_PROFILE_QUIET = "cyclewhere_quiet"
GRAPHHOPPER_PROFILE_BICYCLE = "cyclewhere_bicycle"
GRAPH_VERSION = "2026-06-21"
PROFILE_HASH = "cyclewhere-profiles-v1"
OVERLAY_HASH = "verified-network-2026-06-21"
RANKING_HASH = "fairness-homeward-v1"

[env.production.vars]
CORS_ORIGIN = "https://cyclewhere.pages.dev"
GRAPHHOPPER_PROFILE_OFFICIAL = "cyclewhere_official"
GRAPHHOPPER_PROFILE_QUIET = "cyclewhere_quiet"
GRAPHHOPPER_PROFILE_BICYCLE = "cyclewhere_bicycle"
GRAPH_VERSION = "2026-06-21"
PROFILE_HASH = "cyclewhere-profiles-v1"
OVERLAY_HASH = "verified-network-2026-06-21"
RANKING_HASH = "fairness-homeward-v1"

[[env.production.d1_databases]]
binding = "TRANSIT_CACHE"
database_name = "cyclewhere-transit-cache"
database_id = "40d3dd74-5c27-4839-8e21-c7f597946098"
