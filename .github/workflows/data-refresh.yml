name: Refresh Data Manifest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run data:refresh
      - name: Commit manifest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/network-manifest.json
          git diff --cached --quiet || git commit -m "chore: refresh network manifest"
          git push
